name: Gerar APK Check-Diário PB

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: "URL do sistema publicado no Netlify. Ex: https://seu-site.netlify.app"
        required: true
        default: "https://SEU-SITE.netlify.app"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar plataforma Android
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Aplicar URL do Netlify no app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          p = Path('android-wrapper/app/src/main/res/values/strings.xml')
          url = os.environ['APP_URL'].rstrip('/')
          text = p.read_text()
          text = text.replace('https://SEU-SITE.netlify.app', url)
          p.write_text(text)
          print('URL aplicada:', url)
          PY
        env:
          APP_URL: ${{ github.event.inputs.app_url }}

      - name: Gerar APK Debug
        working-directory: android-wrapper
        run: gradle assembleDebug --no-daemon

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: check-diario-pb-apk
          path: android-wrapper/app/build/outputs/apk/debug/*.apk
